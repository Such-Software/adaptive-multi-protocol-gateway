[gateway]
state_dir = "./.ampg/state"
cache_dir = "./.ampg/cache"
run_dir = "./.ampg/run"
user = "ampg"

[[site]]
id = "wownero_i2p_only"
domain = "wownero.org"

[site.source]
kind = "static-html"
path = "../../wownero.org-website"
canonical_url = "https://wownero.org"

[site.outputs]
root = "../dist/wownero-i2p-only"
plan_root = "../dist/ampg-plan"

[site.interactions]
default_tier = "static"
deny_routes = ["/admin/*", "/internal/*", "/webhooks/*"]

[site.protocols.i2p]
enabled = true
renderer = "privacy-html"
daemon = "i2pd"
daemon_policy = "auto"
local_port = 18081
keys_file = "wownero-web.dat"
tunnel_name = "wownero-web"
max_asset_bytes = 524288
script_policy = "strip"
