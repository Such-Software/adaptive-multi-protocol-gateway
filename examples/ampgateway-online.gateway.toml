[gateway]
state_dir = "./.ampg/ampgateway-online/state"
cache_dir = "./.ampg/ampgateway-online/cache"
run_dir = "./.ampg/ampgateway-online/run"
user = "ampg"

[profiles.visual-vps]
description = "Full VPS deployment for the AMPGateway visual docs and live example sites."
protocols = ["clearnet", "tor", "i2p", "gemini", "reticulum"]
platform = "linux-systemd"
write_artifacts = true

[profiles.visual-lan]
description = "Clearnet-only LAN deployment for the AMPGateway visual docs site."
protocols = ["clearnet"]
platform = "linux-user"

[[site]]
id = "ampgateway-online"
domain = "ampgateway.online"

[site.source]
kind = "static-html"
path = "../sites/ampgateway-online"
canonical_url = "https://ampgateway.online"

[site.outputs]
root = "../dist/ampgateway-online"
plan_root = "../dist/ampg-plan"

[site.interactions]
default_tier = "static"
deny_routes = ["/admin/*", "/internal/*", "/webhooks/*"]

[site.protocols.clearnet]
enabled = true
renderer = "clearnet"
daemon = "nginx"
daemon_policy = "external"
url = "https://ampgateway.online/"

[site.protocols.tor]
enabled = true
renderer = "privacy-html"
daemon = "tor"
daemon_policy = "auto"
local_port = 18180
hidden_service_dir = "/var/lib/tor/ampg/ampgateway-online"
onion_location = "auto"
fixture_url = "http://bn5uppe4zrop2ljsmjtoxtc4bhzs42kj4c6zvme565gz6x6l32ico3id.onion/"
max_asset_bytes = 1048576
script_policy = "strip"

[site.protocols.i2p]
enabled = true
renderer = "privacy-html"
daemon = "i2pd"
daemon_policy = "auto"
local_port = 18181
keys_file = "ampgateway-online-web.dat"
tunnel_name = "ampgateway-online-web"
i2p_url = "http://vfhcumcxtbysxr6wvbpdytb6jpslcqlo3j6e35w7s63el5vsorca.b32.i2p/"
max_asset_bytes = 1048576
script_policy = "strip"

[site.protocols.gemini]
enabled = true
renderer = "gemtext"
daemon = "agate"
daemon_policy = "auto"
port = 1965
gemini_url = "gemini://ampgateway.online/"
max_asset_bytes = 1048576

[site.protocols.reticulum]
enabled = true
renderer = "micron"
daemon = "rnsd"
daemon_policy = "auto"
aspect = "web"
rns_url = "rns://04c455aa45c455a7478c9e90b63f448e/"
max_asset_bytes = 524288

